# =====================================================================
# Pipeline CI/CD — build, tests, qualité, image Docker, déploiement K8s
#
# Secrets configurés dans GitHub (Settings > Secrets and variables > Actions) :
#   - SONAR_TOKEN            (SonarCloud, organisation "senprix")
#   - DOCKERHUB_USERNAME     (ndeyebigue)
#   - DOCKERHUB_TOKEN
#   - KUBE_CONFIG            (pas encore configuré : le job "deploy"
#                             échouera tant que ce secret n'existe pas,
#                             c'est attendu pour l'instant)
# =====================================================================
name: Backend CI/CD — SEN-PRIX

on:
  push:
    branches: [main]
    paths:
      - "user-service/**"
      - "produit-service/**"
      - "campagne-service/**"
      - "prix-service/**"
      - "alerte-service/**"
      - "notif-service/**"
      - "rapport-service/**"
      - "export-service/**"
      - "gateway-service/**"
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - user-service
          - produit-service
          - campagne-service
          - prix-service
          - alerte-service
          - notif-service
          - rapport-service
          - export-service
          - gateway-service
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compilation et tests unitaires (Maven)
        working-directory: ${{ matrix.service }}
        run: mvn -B clean verify

      - name: Analyse de qualité du code (SonarCloud)
        working-directory: ${{ matrix.service }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=senprix
          -Dsonar.organization=senprix
          -Dsonar.host.url=https://sonarcloud.io

      - name: Connexion au registre de conteneurs
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construction et publication de l'image Docker
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/senprix-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/senprix-${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Redéploiement des microservices (rolling update)
        run: |
          kubectl apply -f k8s/senprix-k8s/ -n senprix
          for svc in user-service produit-service campagne-service prix-service \
                     alerte-service notif-service rapport-service export-service gateway-service; do
            kubectl set image deployment/$svc $svc=${{ secrets.DOCKERHUB_USERNAME }}/senprix-$svc:${{ github.sha }} -n senprix
            kubectl rollout status deployment/$svc -n senprix --timeout=120s
          done
