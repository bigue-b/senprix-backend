# =====================================================================
# Secrets Kubernetes — équivalent local d'AWS Secrets Manager.
# ATTENTION : ce fichier contient des exemples de valeurs. En pratique,
# ne JAMAIS committer de vrais secrets dans Git — utiliser plutôt :
#   kubectl create secret generic senprix-secrets \
#     --from-literal=POSTGRES_PASSWORD=xxx \
#     --from-literal=KEYCLOAK_ADMIN_CLIENT_SECRET=xxx \
#     -n senprix
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: senprix-secrets
  namespace: senprix
type: Opaque
stringData:
  POSTGRES_USER: senprix
  POSTGRES_PASSWORD: senprix
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
  KEYCLOAK_ADMIN_CLIENT_SECRET: 0HBq0IKhizVhOyNieLRG2UMtlDHmVIGC
---
# Keycloak vit dans son propre namespace (senprix-keycloak) : les Secrets
# Kubernetes sont scopés par namespace, il faut donc une seconde copie
# identique pour que son Deployment (03-keycloak.yaml) puisse la référencer.
apiVersion: v1
kind: Secret
metadata:
  name: senprix-secrets
  namespace: senprix-keycloak
type: Opaque
stringData:
  POSTGRES_USER: senprix
  POSTGRES_PASSWORD: senprix
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin
  KEYCLOAK_ADMIN_CLIENT_SECRET: 0HBq0IKhizVhOyNieLRG2UMtlDHmVIGC
