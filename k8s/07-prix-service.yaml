apiVersion: apps/v1
kind: Deployment
metadata:
  name: prix-service
  namespace: senprix
  labels:
    app: prix-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prix-service
  template:
    metadata:
      labels:
        app: prix-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: prix-service
          image: senprix/prix-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: DB_URL
              value: "jdbc:postgresql://postgres:5432/prix_db"
            - name: KEYCLOAK_JWK_URI
              value: "http://keycloak:8080/realms/senprix/protocol/openid-connect/certs"
            - name: NOTIF_SERVICE_URL
              value: "http://notif-service:8086"
            - name: CAMPAGNE_SERVICE_URL
              value: "http://campagne-service:8083"
            - name: PRODUIT_SERVICE_URL
              value: "http://produit-service:8082"
            - name: ALERTE_SERVICE_URL
              value: "http://alerte-service:8085"
            - name: RABBITMQ_HOST
              value: "rabbitmq"
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USER
              value: "guest"
            - name: RABBITMQ_PASSWORD
              value: "guest"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: prix-service
  namespace: senprix
spec:
  selector:
    app: prix-service
  ports:
    - port: 8084
      targetPort: 8084
