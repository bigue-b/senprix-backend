# =====================================================================
# AlertManager — notifie en cas de dépassement de seuils critiques.
# Exemple avec un webhook générique ; à remplacer par un vrai canal
# (email via SendGrid, Slack, etc.) selon les besoins.
# =====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: senprix-monitoring
data:
  alertmanager.yml: |
    route:
      receiver: default
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: default
        webhook_configs:
          - url: http://notif-service.senprix.svc.cluster.local:8086/api/internal/alertes-infra
            send_resolved: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: senprix-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args: ["--config.file=/etc/alertmanager/alertmanager.yml"]
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: senprix-monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
---
# Règles d'alerte de base : rattachées à Prometheus (evaluation_interval)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: senprix-monitoring
data:
  alert-rules.yml: |
    groups:
      - name: senprix-alerts
        rules:
          - alert: ServiceDown
            expr: up{job="senprix-microservices"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Le service {{ $labels.service }} est indisponible"
          - alert: LatenceElevee
            expr: http_server_requests_seconds_sum / http_server_requests_seconds_count > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Latence moyenne > 1s sur {{ $labels.service }}"
