spring:
  datasource:
    url: jdbc:h2:mem:notif_test_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  liquibase:
    enabled: false   # Hibernate crée le schéma directement pour accélérer les tests

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8080/realms/senprix/protocol/openid-connect/certs

  mail:
    host: localhost
    port: 3025
    username: test
    password: test

management:
  health:
    mail:
      enabled: false

notification:
  email:
    expediteur: no-reply@senprix.sn

logging:
  level:
    sn.dci.senprix.notif: DEBUG