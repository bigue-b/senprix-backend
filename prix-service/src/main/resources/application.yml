server:
  port: 8084

spring:
  application:
    name: PRIX-SERVICE

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/prix_db}
    username: ${DB_USER:senprix}
    password: ${DB_PASSWORD:senprix}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Le schéma est géré par Liquibase, pas par Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/senprix/protocol/openid-connect/certs}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

# URLs des microservices distants appelés pour la validation croisée
# des relevés de prix (produit et campagne/agent).
services:
  produit-service-url: ${PRODUIT_SERVICE_URL:http://localhost:8082}
  campagne-service-url: ${CAMPAGNE_SERVICE_URL:http://localhost:8083}
  alerte-service-url: ${ALERTE_SERVICE_URL:http://localhost:8085}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    sn.dci.senprix.prix: INFO
    org.hibernate.SQL: WARN
