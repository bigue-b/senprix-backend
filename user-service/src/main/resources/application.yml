server:
  port: 8081

spring:
  application:
    name: USER-SERVICE

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${DB_USER:senprix}
    password: ${DB_PASSWORD:senprix}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # Le schéma est géré par Liquibase, pas par Hibernate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # Le dialecte est auto-détecté par Spring Boot depuis l'URL JDBC.

  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/senprix/protocol/openid-connect/certs}

# Configuration du client Keycloak disposant des droits d'administration
# (Service Account avec le rôle "manage-users" sur le Realm senprix).
# Ce client est distinct du client utilisé pour l'authentification classique.
keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:senprix}
    admin-realm: ${KEYCLOAK_ADMIN_REALM:senprix}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:senprix-admin-client}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:X6Dsugy3HyCzKto5YrAm5q9FSpLO42Ny}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

logging:
  level:
    sn.dci.senprix.user: INFO
    org.hibernate.SQL: WARN
